<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motivational Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== THEME VARIABLES ===== */
[data-theme="dark"] {
  --bg: #0f0f11; --surface: #17171a; --surface2: #1e1e23;
  --border: #2a2a32; --border2: #35353f;
  --accent: #e8c87a; --accent2: #7a9ee8;
  --text: #f0ede6; --muted: #6b6878; --muted2: #4a4858;
  --danger: #e87a7a; --success: #7ae8a8;
  --clock-face: #17171a; --clock-ring: #252530;
  --clock-tick: #3a3a45; --clock-tick-min: #252530;
  --hand-color: #f0ede6; --modal-bg: rgba(0,0,0,0.72);
}
[data-theme="light"] {
  --bg: #f5f3ee; --surface: #ffffff; --surface2: #f0ede6;
  --border: #ddd9d0; --border2: #ccc8be;
  --accent: #b8922a; --accent2: #3a6eb8;
  --text: #1a1916; --muted: #8a8680; --muted2: #b8b4ae;
  --danger: #c84040; --success: #2a8a50;
  --clock-face: #f8f6f2; --clock-ring: #e0ddd6;
  --clock-tick: #aaa8a0; --clock-tick-min: #d8d5ce;
  --hand-color: #1a1916; --modal-bg: rgba(0,0,0,0.45);
}

body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 13px;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
  transition: background 0.25s, color 0.25s;
}

/* HEADER */
header {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 24px 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
header h1 {
  font-family: 'DM Serif Display', serif; font-size: 22px;
  font-style: italic; color: var(--accent); letter-spacing: -0.5px; flex-shrink: 0;
}
header .date-display {
  font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0;
}
.quote-wrap {
  flex: 1; text-align: right; overflow: hidden; padding-left: 16px;
}
.quote-text {
  font-size: 11px; color: var(--muted); font-style: italic;
  line-height: 1.5; display: inline-block; max-width: 340px;
  transition: opacity 0.4s;
}
.quote-text.fade { opacity: 0; }

/* Settings gear button */
.settings-btn {
  width: 32px; height: 32px; flex-shrink: 0;
  background: none; border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; color: var(--muted);
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, color 0.15s, transform 0.3s;
}
.settings-btn:hover { border-color: var(--accent); color: var(--accent); }
.settings-btn.open { transform: rotate(45deg); border-color: var(--accent); color: var(--accent); }

.main { display: flex; flex: 1; overflow: hidden; }

/* DIARY */
.diary-col { width: 380px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.diary-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.diary-header span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.diary-scroll { overflow-y: auto; flex: 1; position: relative; }
.diary-scroll::-webkit-scrollbar { width: 4px; }
.diary-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.time-grid { position: relative; }
.time-row { display: flex; height: 56px; border-bottom: 1px solid var(--border); position: relative; }
.time-label { width: 48px; flex-shrink: 0; padding: 6px 10px 0 0; text-align: right; font-size: 10px; color: var(--muted); line-height: 1; }
.time-slot { flex: 1; position: relative; cursor: pointer; }
.time-slot:hover { background: rgba(128,128,128,0.05); }
.time-now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--accent); z-index: 10; pointer-events: none; }
.time-now-line::before { content: ''; position: absolute; left: 0; top: -3px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.event-block { position: absolute; left: 4px; right: 4px; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; overflow: hidden; z-index: 5; transition: opacity 0.15s; border-left: 3px solid; }
.event-block:hover { opacity: 0.85; }
.event-block .ev-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-block .ev-time { font-size: 10px; opacity: 0.7; margin-top: 1px; }

/* RIGHT */
.right-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.clock-section { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 24px; flex-shrink: 0; }
.clock-wrap { position: relative; width: 160px; height: 160px; flex-shrink: 0; }
#clock-svg { width: 160px; height: 160px; }
.clock-info { flex: 1; }
.active-task-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.active-task-name { font-size: 16px; color: var(--accent); margin-top: 6px; font-style: italic; font-family: 'DM Serif Display', serif; line-height: 1.3; }
.active-task-time { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* TASKS */
.tasks-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tasks-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.tasks-header span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.tasks-body { flex: 1; overflow-y: auto; }
.tasks-body::-webkit-scrollbar { width: 4px; }
.tasks-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.section-toggle { display: flex; align-items: center; gap: 8px; padding: 9px 16px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.section-toggle:hover { background: var(--surface2); }
.toggle-arrow { font-size: 9px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
.section-toggle.open .toggle-arrow { transform: rotate(90deg); }
.section-label { font-size: 11px; color: var(--text); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.section-count { margin-left: auto; font-size: 10px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; }
.section-content.collapsed { display: none; }
.task-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 16px; transition: background 0.1s; border-left: 3px solid transparent; }
.task-item:hover { background: var(--surface2); }
.task-item.active-timer { background: rgba(184,146,42,0.06); }
.task-check { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 3px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--success); cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.task-item.done .task-check { background: rgba(42,138,80,0.12); border-color: var(--success); }
.task-item.done .task-title-text { text-decoration: line-through; color: var(--muted); }
.task-text { flex: 1; line-height: 1.5; font-size: 12px; min-width: 0; }
.task-title-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-desc { font-size: 10px; color: var(--muted); margin-top: 2px; }
.task-deadline { font-size: 10px; color: var(--danger); margin-top: 2px; }
.task-link { font-size: 10px; color: var(--accent2); text-decoration: none; display: block; margin-top: 2px; }
.task-link:hover { text-decoration: underline; }
.task-actions { display: flex; gap: 5px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
.task-item:hover .task-actions { opacity: 1; }

.btn-sm { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 3px; padding: 2px 6px; font-size: 10px; cursor: pointer; font-family: 'DM Mono', monospace; transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }
.add-task-bar { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

input[type="text"], input[type="date"], textarea {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
  border-radius: 4px; padding: 6px 10px; outline: none; transition: border-color 0.15s;
}
input[type="text"]:focus, input[type="date"]:focus, textarea:focus { border-color: var(--accent); }
.btn-add { background: var(--accent); border: none; color: #0f0f11; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; border-radius: 4px; padding: 6px 12px; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
.btn-add:hover { opacity: 0.85; }
.empty-state { padding: 12px 16px; color: var(--muted); font-size: 11px; font-style: italic; }

/* MODALS */
.modal-overlay { position: fixed; inset: 0; background: var(--modal-bg); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 440px; max-width: 92vw; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--accent); margin-bottom: 14px; font-style: italic; }
.modal label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal textarea { width: 100%; }
.modal textarea { resize: vertical; min-height: 56px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.type-tabs { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 14px; }
.type-tab { flex: 1; padding: 7px 10px; text-align: center; font-size: 11px; cursor: pointer; color: var(--muted); background: transparent; border: none; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; transition: background 0.15s, color 0.15s; }
.type-tab.active { background: var(--accent); color: #0f0f11; font-weight: 500; }
.field-group.hidden { display: none; }
.ev-colors { display: flex; gap: 6px; margin-top: 6px; }
.ev-color-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.ev-color-dot.selected { border-color: var(--text); }

/* ===== SETTINGS PANEL ===== */
.settings-overlay { position: fixed; inset: 0; z-index: 90; display: none; }
.settings-overlay.open { display: block; }

.settings-panel {
  position: fixed; top: 58px; right: 20px;
  width: 320px; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  z-index: 91; overflow: hidden;
  animation: panelIn 0.18s ease;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.settings-section {
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.settings-section:last-child { border-bottom: none; }

.settings-section-title {
  font-size: 10px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 10px;
}

/* Theme toggle */
.theme-toggle-row { display: flex; align-items: center; justify-content: space-between; }
.theme-toggle-label { font-size: 12px; color: var(--text); }
.theme-switch {
  display: flex; gap: 4px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px;
}
.theme-opt {
  padding: 4px 10px; border-radius: 4px; font-size: 11px;
  cursor: pointer; color: var(--muted); background: none; border: none;
  font-family: 'DM Mono', monospace; transition: background 0.15s, color 0.15s;
}
.theme-opt.active { background: var(--accent); color: #0f0f11; font-weight: 500; }

/* Quote interval */
.interval-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.interval-label { font-size: 12px; color: var(--text); }
.interval-select {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 11px; border-radius: 4px;
  padding: 4px 8px; outline: none; cursor: pointer;
}
.interval-select:focus { border-color: var(--accent); }

/* Quotes list */
.quotes-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
.quotes-list::-webkit-scrollbar { width: 3px; }
.quotes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.quote-item {
  display: flex; align-items: flex-start; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px; font-size: 11px;
  color: var(--text); line-height: 1.4;
}
.quote-item .q-text { flex: 1; font-style: italic; }
.quote-item .q-del {
  background: none; border: none; color: var(--muted2); cursor: pointer;
  font-size: 13px; padding: 0; line-height: 1; flex-shrink: 0;
  transition: color 0.15s;
}
.quote-item .q-del:hover { color: var(--danger); }

.quote-add-row { display: flex; gap: 6px; }
.quote-add-row input { flex: 1; font-size: 11px; }
.quote-add-row button { flex-shrink: 0; }

.quote-nav-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px;
}
.quote-nav-row span { font-size: 10px; color: var(--muted); }
.quote-nav-btns { display: flex; gap: 4px; }
</style>
</head>
<body>

<header>
  <h1>Motivational Tracker</h1>
  <span class="date-display" id="header-date"></span>
  <div class="quote-wrap">
    <span class="quote-text" id="daily-quote"></span>
  </div>
  <button class="settings-btn" id="settings-btn" onclick="toggleSettings()" title="Settings">⚙</button>
</header>

<div class="main">
  <div class="diary-col">
    <div class="diary-header">
      <span>Day Diary</span>
      <button class="btn-sm" onclick="openAddModal('event')">+ Add Event</button>
    </div>
    <div class="diary-scroll" id="diary-scroll">
      <div class="time-grid" id="time-grid"></div>
    </div>
  </div>

  <div class="right-col">
    <div class="clock-section">
      <div class="clock-wrap">
        <svg id="clock-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <circle cx="80" cy="80" r="72" fill="none" stroke="var(--clock-ring)" stroke-width="7"/>
          <circle id="task-arc" cx="80" cy="80" r="72" fill="none"
            stroke="#e8c87a" stroke-width="7"
            stroke-dasharray="452.4" stroke-dashoffset="452.4"
            stroke-linecap="round"
            transform="rotate(-90 80 80)"/>
          <circle cx="80" cy="80" r="62" fill="var(--clock-face)"/>
          <circle cx="80" cy="80" r="60" fill="none" stroke="var(--clock-ring)" stroke-width="0.5"/>
          <g id="hour-ticks"></g>
          <line id="hand-hour" x1="80" y1="80" x2="80" y2="44" stroke="var(--hand-color)" stroke-width="3.5" stroke-linecap="round"/>
          <line id="hand-min" x1="80" y1="80" x2="80" y2="26" stroke="var(--hand-color)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="80" cy="80" r="4" fill="var(--accent)"/>
        </svg>
      </div>
      <div class="clock-info">
        <div class="active-task-label">Now running</div>
        <div class="active-task-name" id="active-task-name">—</div>
        <div class="active-task-time" id="active-task-time"></div>
      </div>
    </div>

    <div class="tasks-section">
      <div class="tasks-header">
        <span>Tasks</span>
        <button class="btn-sm" onclick="openAddModal('today')">+ Add Task</button>
      </div>
      <div class="tasks-body" id="tasks-body"></div>
      <div class="add-task-bar">
        <input type="text" id="quick-task" placeholder="Quick add to-do..." style="flex:1" onkeydown="if(event.key==='Enter') quickAddTodo()">
        <button class="btn-add" onclick="quickAddTodo()">Add</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS OVERLAY -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettings()"></div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settings-panel" style="display:none">

  <div class="settings-section">
    <div class="settings-section-title">Appearance</div>
    <div class="theme-toggle-row">
      <span class="theme-toggle-label">Theme</span>
      <div class="theme-switch">
        <button class="theme-opt" id="theme-dark" onclick="setTheme('dark')">Dark</button>
        <button class="theme-opt" id="theme-light" onclick="setTheme('light')">Light</button>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Motivational Quotes</div>

    <div class="quotes-list" id="quotes-list"></div>

    <div class="quote-add-row">
      <input type="text" id="new-quote-input" placeholder="Add your own quote..." onkeydown="if(event.key==='Enter') addQuote()">
      <button class="btn-add" onclick="addQuote()" style="font-size:12px;padding:6px 10px;">+</button>
    </div>

    <div class="interval-row">
      <span class="interval-label">Rotate every</span>
      <select class="interval-select" id="quote-interval" onchange="saveSettings()">
        <option value="300000" selected>5 minutes</option>
        <option value="600000">10 minutes</option>
        <option value="900000">15 minutes</option>
        <option value="1800000">30 minutes</option>
        <option value="3600000">1 hour</option>
        <option value="0">Manual only</option>
      </select>
    </div>

    <div class="quote-nav-row">
      <span id="quote-index-display"></span>
      <div class="quote-nav-btns">
        <button class="btn-sm" onclick="prevQuote()">← Prev</button>
        <button class="btn-sm" onclick="nextQuote()">Next →</button>
      </div>
    </div>
  </div>

</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3 id="modal-title">New Task</h3>
    <div class="type-tabs" id="type-tabs">
      <button class="type-tab active" id="tab-today" onclick="switchTab('today')">Task for Today</button>
      <button class="type-tab" id="tab-todo" onclick="switchTab('todo')">To-Do</button>
    </div>
    <label>Title</label>
    <input type="text" id="m-title" placeholder="What needs doing?">
    <div class="field-group" id="fg-today">
      <label>Start time</label>
      <input type="text" id="m-start" placeholder="09:00">
      <label>End time</label>
      <input type="text" id="m-end" placeholder="10:00">
      <label>Color</label>
      <div class="ev-colors" id="m-colors"></div>
    </div>
    <div class="field-group hidden" id="fg-todo">
      <label>Deadline (optional)</label>
      <input type="date" id="m-deadline">
    </div>
    <label>Description</label>
    <textarea id="m-desc" placeholder="Notes..."></textarea>
    <label>Link</label>
    <input type="text" id="m-link" placeholder="https://...">
    <div class="modal-btns">
      <button class="btn-sm" style="color:var(--danger)" onclick="closeAddModal()">Cancel</button>
      <button class="btn-add" onclick="saveFromModal()">Save</button>
    </div>
  </div>
</div>

<script>
const HOURS_START=6, HOURS_END=23, HOUR_H=56;
const CIRC=2*Math.PI*72;
const EVENT_COLORS=['#e8c87a','#7a9ee8','#7ae8a8','#e87a7a','#c87ae8','#e8a87a'];
const DEFAULT_QUOTES=[
  "The secret of getting ahead is getting started.",
  "Do what you can, with what you have, where you are.",
  "Small steps every day.",
  "Focus is the art of knowing what to ignore.",
  "Your future self is watching you right now.",
  "One task at a time. One hour at a time.",
  "Progress, not perfection.",
  "Show up. Do the work. Trust the process."
];

// ===== STATE =====
let events=JSON.parse(localStorage.getItem('mt_events')||'[]');
let todos=JSON.parse(localStorage.getItem('mt_todos')||'[]');
try{const o=JSON.parse(localStorage.getItem('mt_tasks')||'[]');if(o.length&&!todos.length){todos=o;save();}}catch(e){}

let settings=JSON.parse(localStorage.getItem('mt_settings')||'{}');
if(!settings.theme) settings.theme='dark';
if(!settings.quotes) settings.quotes=[...DEFAULT_QUOTES];
if(!settings.quoteInterval && settings.quoteInterval!==0) settings.quoteInterval=300000;

let quoteIndex=0;
let quoteTimer=null;
let activeEventId=null;
let selectedColor=EVENT_COLORS[0];
let currentTab='today';
let editingId=null, editingType=null;
let todayOpen=true, todoOpen=true;
let settingsOpen=false;

// ===== INIT =====
function init(){
  applyTheme(settings.theme, false);
  buildGrid();
  renderAll();
  buildTicks();
  startClock();
  scrollNow();
  startQuoteLoop();
  showQuote(quoteIndex, false);
}

function renderAll(){ renderEvents(); renderPanel(); }
function save(){
  localStorage.setItem('mt_events',JSON.stringify(events));
  localStorage.setItem('mt_todos',JSON.stringify(todos));
}
function saveSettings(){
  settings.quoteInterval=parseInt(document.getElementById('quote-interval').value);
  localStorage.setItem('mt_settings',JSON.stringify(settings));
  startQuoteLoop();
}

// ===== THEME =====
function applyTheme(theme, persist=true){
  settings.theme=theme;
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('theme-dark').classList.toggle('active',theme==='dark');
  document.getElementById('theme-light').classList.toggle('active',theme==='light');
  if(persist){ localStorage.setItem('mt_settings',JSON.stringify(settings)); }
  // Update SVG clock colors (CSS vars don't always work inside SVG in all browsers)
  updateClockColors();
}
function setTheme(t){ applyTheme(t); }

function updateClockColors(){
  const isDark=settings.theme==='dark';
  const face=isDark?'#17171a':'#f8f6f2';
  const ring=isDark?'#252530':'#e0ddd6';
  const handCol=isDark?'#f0ede6':'#1a1916';
  const accentCol=isDark?'#e8c87a':'#b8922a';
  // face & ring circles
  const circles=document.querySelectorAll('#clock-svg circle');
  if(circles[1]) circles[1].setAttribute('stroke',ring); // outer ring bg
  if(circles[2]) circles[2].setAttribute('fill',face);   // face fill
  if(circles[3]) circles[3].setAttribute('stroke',ring); // face stroke
  // hands
  ['hand-hour','hand-min'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.setAttribute('stroke',handCol);
  });
  // center dot
  const dots=document.querySelectorAll('#clock-svg circle');
  if(dots[dots.length-1]) dots[dots.length-1].setAttribute('fill',accentCol);
  // ticks
  const isDarkMode=settings.theme==='dark';
  document.querySelectorAll('#hour-ticks line').forEach((l,i)=>{
    if(i<12) l.setAttribute('stroke',isDarkMode?'#3a3a45':'#aaa8a0');
    else l.setAttribute('stroke',isDarkMode?'#252530':'#d8d5ce');
  });
}

// ===== QUOTES =====
function showQuote(idx, animate=true){
  const qs=settings.quotes;
  if(!qs.length) return;
  quoteIndex=((idx%qs.length)+qs.length)%qs.length;
  const el=document.getElementById('daily-quote');
  if(animate){
    el.classList.add('fade');
    setTimeout(()=>{ el.textContent=qs[quoteIndex]; el.classList.remove('fade'); }, 400);
  } else {
    el.textContent=qs[quoteIndex];
  }
  updateQuoteIndexDisplay();
}

function nextQuote(){ showQuote(quoteIndex+1); }
function prevQuote(){ showQuote(quoteIndex-1); }

function startQuoteLoop(){
  if(quoteTimer) clearInterval(quoteTimer);
  const interval=settings.quoteInterval||300000;
  if(interval===0) return;
  quoteTimer=setInterval(()=>showQuote(quoteIndex+1), interval);
}

function addQuote(){
  const inp=document.getElementById('new-quote-input');
  const text=inp.value.trim(); if(!text) return;
  settings.quotes.push(text);
  localStorage.setItem('mt_settings',JSON.stringify(settings));
  inp.value='';
  renderQuotesList();
  showQuote(settings.quotes.length-1);
}

function deleteQuote(idx){
  settings.quotes.splice(idx,1);
  localStorage.setItem('mt_settings',JSON.stringify(settings));
  if(quoteIndex>=settings.quotes.length) quoteIndex=Math.max(0,settings.quotes.length-1);
  renderQuotesList();
  showQuote(quoteIndex, false);
}

function renderQuotesList(){
  const list=document.getElementById('quotes-list');
  list.innerHTML='';
  settings.quotes.forEach((q,i)=>{
    const item=document.createElement('div');
    item.className='quote-item';
    item.innerHTML=`<span class="q-text">${q}</span><button class="q-del" onclick="deleteQuote(${i})" title="Remove">×</button>`;
    list.appendChild(item);
  });
  updateQuoteIndexDisplay();
}

function updateQuoteIndexDisplay(){
  const el=document.getElementById('quote-index-display');
  if(el) el.textContent=`${quoteIndex+1} / ${settings.quotes.length}`;
}

// ===== SETTINGS PANEL =====
function toggleSettings(){
  settingsOpen=!settingsOpen;
  const panel=document.getElementById('settings-panel');
  const overlay=document.getElementById('settings-overlay');
  const btn=document.getElementById('settings-btn');
  if(settingsOpen){
    panel.style.display='block';
    overlay.classList.add('open');
    btn.classList.add('open');
    // Sync UI state
    document.getElementById('quote-interval').value=settings.quoteInterval||300000;
    renderQuotesList();
    applyTheme(settings.theme, false);
  } else {
    panel.style.display='none';
    overlay.classList.remove('open');
    btn.classList.remove('open');
  }
}
function closeSettings(){ if(settingsOpen) toggleSettings(); }

// ===== TIME GRID =====
function buildGrid(){
  const g=document.getElementById('time-grid'); g.innerHTML='';
  for(let h=HOURS_START;h<=HOURS_END;h++){
    const row=document.createElement('div'); row.className='time-row';
    const lbl=document.createElement('div'); lbl.className='time-label';
    lbl.textContent=h.toString().padStart(2,'0')+':00';
    const slot=document.createElement('div'); slot.className='time-slot';
    slot.onclick=()=>openAddModal('event',h);
    row.appendChild(lbl); row.appendChild(slot); g.appendChild(row);
  }
  const nl=document.createElement('div'); nl.className='time-now-line'; nl.id='now-line';
  g.appendChild(nl);
  updateNowLine(); setInterval(updateNowLine,60000);
}
function updateNowLine(){
  const n=new Date();
  const mins=(n.getHours()-HOURS_START)*60+n.getMinutes();
  const l=document.getElementById('now-line');
  if(l) l.style.top=(mins/60*HOUR_H)+'px';
}
function scrollNow(){
  const n=new Date();
  document.getElementById('diary-scroll').scrollTop=Math.max(0,((n.getHours()-HOURS_START)*60+n.getMinutes())/60*HOUR_H-80);
}

// ===== EVENTS =====
function renderEvents(){
  document.querySelectorAll('.event-block').forEach(e=>e.remove());
  const g=document.getElementById('time-grid');
  events.forEach(ev=>{
    const b=document.createElement('div'); b.className='event-block';
    const sm=t2m(ev.start)-HOURS_START*60, em=t2m(ev.end)-HOURS_START*60;
    b.style.top=(sm/60*HOUR_H)+'px';
    b.style.height=Math.max(20,(em-sm)/60*HOUR_H-2)+'px';
    b.style.background=ha(ev.color||EVENT_COLORS[0],0.18);
    b.style.borderLeftColor=ev.color||EVENT_COLORS[0];
    b.style.color=ev.color||EVENT_COLORS[0];
    b.innerHTML=`<div class="ev-title">${ev.title}</div><div class="ev-time">${ev.start}–${ev.end}</div>`;
    b.onclick=e=>{e.stopPropagation();editEvent(ev.id);};
    g.appendChild(b);
  });
}
function editEvent(id){
  const ev=events.find(e=>e.id===id); if(!ev) return;
  editingId=id; editingType='event';
  document.getElementById('modal-title').textContent='Edit Event';
  document.getElementById('type-tabs').style.display='none';
  switchTab('today');
  document.getElementById('m-title').value=ev.title;
  document.getElementById('m-start').value=ev.start;
  document.getElementById('m-end').value=ev.end;
  document.getElementById('m-desc').value=ev.desc||'';
  document.getElementById('m-link').value=ev.link||'';
  selectedColor=ev.color||EVENT_COLORS[0]; buildColorPicker();
  document.getElementById('add-modal').classList.add('open');
}
function deleteEvent(e,id){
  e.stopPropagation();
  events=events.filter(ev=>ev.id!=id);
  if(activeEventId==id){activeEventId=null;updateActiveUI(null);}
  save(); renderAll();
}

// ===== PANEL =====
function renderPanel(){
  const body=document.getElementById('tasks-body'); body.innerHTML='';
  const sortedEv=events.slice().sort((a,b)=>t2m(a.start)-t2m(b.start));
  const s1=makeToggle('Tasks for Today',sortedEv.length,todayOpen,()=>{todayOpen=!todayOpen;renderPanel();});
  body.appendChild(s1);
  const c1=document.createElement('div');
  c1.className='section-content'+(todayOpen?'':' collapsed');
  if(!sortedEv.length){
    const e=document.createElement('div'); e.className='empty-state';
    e.textContent='No events today. Click a time slot or "+ Add Task".';
    c1.appendChild(e);
  } else {
    sortedEv.forEach(ev=>{
      const isActive=activeEventId===ev.id;
      const item=document.createElement('div');
      item.className='task-item'+(isActive?' active-timer':'');
      item.style.borderLeftColor=isActive?(ev.color||EVENT_COLORS[0]):'transparent';
      item.innerHTML=`
        <div style="width:14px;height:14px;border-radius:3px;flex-shrink:0;margin-top:2px;background:${ha(ev.color||'#e8c87a',0.25)};border:1.5px solid ${ev.color||'#e8c87a'};"></div>
        <div class="task-text">
          <div class="task-title-text">${ev.title}</div>
          <div class="task-desc">${ev.start}–${ev.end}${ev.desc?' · '+ev.desc:''}</div>
          ${ev.link?`<a class="task-link" href="${ev.link}" target="_blank">↗ link</a>`:''}
        </div>
        <div class="task-actions">
          ${isActive?`<button class="btn-sm danger" onclick="stopActive(event)">■ Stop</button>`:`<button class="btn-sm" onclick="setActive(event,${ev.id})">▶ Start</button>`}
          <button class="btn-sm danger" onclick="deleteEvent(event,${ev.id})">✕</button>
        </div>`;
      c1.appendChild(item);
    });
  }
  body.appendChild(c1);

  const s2=makeToggle('To-Do List',todos.length,todoOpen,()=>{todoOpen=!todoOpen;renderPanel();});
  body.appendChild(s2);
  const c2=document.createElement('div');
  c2.className='section-content'+(todoOpen?'':' collapsed');
  if(!todos.length){
    const e=document.createElement('div'); e.className='empty-state';
    e.textContent='No to-dos yet. Quick-add below or use "+ Add Task".';
    c2.appendChild(e);
  } else {
    todos.forEach(tk=>{
      const item=document.createElement('div');
      item.className='task-item'+(tk.done?' done':'');
      item.innerHTML=`
        <div class="task-check" onclick="toggleTodo(event,'${tk.id}')">${tk.done?'✓':''}</div>
        <div class="task-text">
          <div class="task-title-text">${tk.title}</div>
          ${tk.desc?`<div class="task-desc">${tk.desc}</div>`:''}
          ${tk.deadline?`<div class="task-deadline">due ${fmtDate(tk.deadline)}</div>`:''}
          ${tk.link?`<a class="task-link" href="${tk.link}" target="_blank">↗ link</a>`:''}
        </div>
        <div class="task-actions">
          <button class="btn-sm" onclick="scheduleToday(event,'${tk.id}')">+ Today</button>
          <button class="btn-sm danger" onclick="deleteTodo(event,'${tk.id}')">✕</button>
        </div>`;
      c2.appendChild(item);
    });
  }
  body.appendChild(c2);
}

function makeToggle(label,count,isOpen,cb){
  const d=document.createElement('div');
  d.className='section-toggle'+(isOpen?' open':'');
  d.innerHTML=`<span class="toggle-arrow">▶</span><span class="section-label">${label}</span><span class="section-count">${count}</span>`;
  d.onclick=cb; return d;
}

function toggleTodo(e,id){ e.stopPropagation(); const t=todos.find(t=>t.id==id); if(t) t.done=!t.done; save(); renderPanel(); }
function deleteTodo(e,id){ e.stopPropagation(); todos=todos.filter(t=>t.id!=id); save(); renderPanel(); }
function scheduleToday(e,id){
  e.stopPropagation();
  const tk=todos.find(t=>t.id==id); if(!tk) return;
  editingId=null; editingType=null;
  document.getElementById('modal-title').textContent='Schedule for Today';
  document.getElementById('type-tabs').style.display='none';
  switchTab('today');
  document.getElementById('m-title').value=tk.title;
  document.getElementById('m-start').value=''; document.getElementById('m-end').value='';
  document.getElementById('m-desc').value=tk.desc||''; document.getElementById('m-link').value=tk.link||'';
  selectedColor=EVENT_COLORS[1]; buildColorPicker();
  document.getElementById('add-modal').dataset.fromTodo=tk.id;
  document.getElementById('add-modal').classList.add('open');
}
function quickAddTodo(){
  const inp=document.getElementById('quick-task');
  const title=inp.value.trim(); if(!title) return;
  todos.push({id:Date.now(),title,desc:'',link:'',deadline:'',done:false});
  save(); renderPanel(); inp.value='';
}

// ===== ARC =====
function setActive(e,id){
  e.stopPropagation(); activeEventId=id;
  updateActiveUI(events.find(e=>e.id===id));
  renderPanel();
}
function stopActive(e){
  e.stopPropagation(); activeEventId=null;
  updateActiveUI(null); renderPanel();
}
function updateActiveUI(ev){
  document.getElementById('active-task-name').textContent=ev?ev.title:'—';
  document.getElementById('active-task-time').textContent=ev?ev.start+' – '+ev.end:'';
  if(!ev) setArc(0,null);
}
function tickArc(){
  if(!activeEventId) return;
  const ev=events.find(e=>e.id===activeEventId); if(!ev) return;
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  const dur=t2m(ev.end)-t2m(ev.start); if(dur<=0) return;
  const pct=Math.min(1,Math.max(0,(nowMins-t2m(ev.start))/dur));
  setArc(pct,ev.color);
}
function setArc(pct,color){
  const arc=document.getElementById('task-arc');
  arc.setAttribute('stroke-dashoffset',CIRC*(1-pct));
  arc.setAttribute('stroke',color||'var(--accent)');
}

// ===== MODAL =====
function openAddModal(type,preHour){
  editingId=null; editingType=null;
  document.getElementById('add-modal').dataset.fromTodo='';
  document.getElementById('modal-title').textContent='New Task';
  document.getElementById('type-tabs').style.display='flex';
  document.getElementById('m-title').value='';
  document.getElementById('m-start').value=preHour!=null?preHour.toString().padStart(2,'0')+':00':'';
  document.getElementById('m-end').value=preHour!=null?(preHour+1).toString().padStart(2,'0')+':00':'';
  document.getElementById('m-desc').value=''; document.getElementById('m-link').value='';
  document.getElementById('m-deadline').value='';
  selectedColor=EVENT_COLORS[0]; buildColorPicker();
  switchTab(type==='event'?'today':(type||'today'));
  document.getElementById('add-modal').classList.add('open');
}
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-today').classList.toggle('active',tab==='today');
  document.getElementById('tab-todo').classList.toggle('active',tab==='todo');
  document.getElementById('fg-today').classList.toggle('hidden',tab!=='today');
  document.getElementById('fg-todo').classList.toggle('hidden',tab!=='todo');
}
function buildColorPicker(){
  const cont=document.getElementById('m-colors'); cont.innerHTML='';
  EVENT_COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='ev-color-dot'+(c===selectedColor?' selected':'');
    d.style.background=c;
    d.onclick=()=>{selectedColor=c;buildColorPicker();};
    cont.appendChild(d);
  });
}
function saveFromModal(){
  const title=document.getElementById('m-title').value.trim(); if(!title) return;
  const fromTodoId=document.getElementById('add-modal').dataset.fromTodo;
  if(currentTab==='today'||editingType==='event'){
    const start=document.getElementById('m-start').value.trim();
    const end=document.getElementById('m-end').value.trim();
    if(!start||!end){document.getElementById('m-start').focus();return;}
    if(editingId&&editingType==='event'){
      const ev=events.find(e=>e.id===editingId);
      if(ev){ev.title=title;ev.start=start;ev.end=end;ev.desc=document.getElementById('m-desc').value;ev.link=document.getElementById('m-link').value;ev.color=selectedColor;}
    } else {
      events.push({id:Date.now(),title,start,end,desc:document.getElementById('m-desc').value,link:document.getElementById('m-link').value,color:selectedColor});
    }
    if(fromTodoId) todos=todos.filter(t=>t.id!=fromTodoId);
  } else {
    if(editingId&&editingType==='todo'){
      const tk=todos.find(t=>t.id===editingId);
      if(tk){tk.title=title;tk.desc=document.getElementById('m-desc').value;tk.link=document.getElementById('m-link').value;tk.deadline=document.getElementById('m-deadline').value;}
    } else {
      todos.push({id:Date.now(),title,desc:document.getElementById('m-desc').value,link:document.getElementById('m-link').value,deadline:document.getElementById('m-deadline').value,done:false});
    }
  }
  save(); renderAll(); closeAddModal();
}
function closeAddModal(){
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('add-modal').dataset.fromTodo='';
  document.getElementById('type-tabs').style.display='flex';
  editingId=null; editingType=null;
}

// ===== CLOCK =====
function buildTicks(){
  const g=document.getElementById('hour-ticks');
  const isDark=settings.theme==='dark';
  for(let i=0;i<12;i++){
    const a=(i/12)*360-90,r=a*Math.PI/180;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',80+53*Math.cos(r)); l.setAttribute('y1',80+53*Math.sin(r));
    l.setAttribute('x2',80+58*Math.cos(r)); l.setAttribute('y2',80+58*Math.sin(r));
    l.setAttribute('stroke',isDark?'#3a3a45':'#aaa8a0'); l.setAttribute('stroke-width','2.5');
    g.appendChild(l);
  }
  for(let i=0;i<60;i++){
    if(i%5===0) continue;
    const a=(i/60)*360-90,r=a*Math.PI/180;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',80+56*Math.cos(r)); l.setAttribute('y1',80+56*Math.sin(r));
    l.setAttribute('x2',80+58*Math.cos(r)); l.setAttribute('y2',80+58*Math.sin(r));
    l.setAttribute('stroke',isDark?'#252530':'#d8d5ce'); l.setAttribute('stroke-width','1');
    g.appendChild(l);
  }
}
function startClock(){ updateClock(); setInterval(updateClock,1000); }
function updateClock(){
  const n=new Date();
  rotateHand('hand-min',n.getMinutes()*6+n.getSeconds()*0.1,40);
  rotateHand('hand-hour',(n.getHours()%12)*30+n.getMinutes()*0.5,26);
  document.getElementById('header-date').textContent=
    n.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
  tickArc();
}
function rotateHand(id,deg,len){
  const el=document.getElementById(id); if(!el) return;
  const r=(deg-90)*Math.PI/180;
  el.setAttribute('x1',80); el.setAttribute('y1',80);
  el.setAttribute('x2',80+len*Math.cos(r)); el.setAttribute('y2',80+len*Math.sin(r));
}

// ===== UTILS =====
function t2m(t){ if(!t) return 0; const[h,m]=t.split(':').map(Number); return h*60+(m||0); }
function ha(hex,alpha){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${alpha})`; }
function fmtDate(d){ if(!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

document.getElementById('add-modal').addEventListener('click',function(e){ if(e.target===this) closeAddModal(); });

init();
</script>
